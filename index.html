<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giovanni - Página Personal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8f4fd;
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #4a90d9, #357abd);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        main {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            text-align: center;
        }
        main img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        main h2 {
            margin-bottom: 15px;
            color: #4a90d9;
        }
        main p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        footer {
            background-color: #357abd;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>¡Hola! Soy Giovanni</h1>
        <p>Estudiante de Ingeniería Informática &amp; Soporte IT</p>
    </header>

    <main>
        <h2>Mi Infografía Personal</h2>
        <img src="infografia.jpg" alt="Infografía personal de Giovanni">
        <p>Buscando crecer en el mundo IT y mejorar cada día.</p>
    </main>

    <footer>
        <p>Diseño y Desarrollo Web - UADE - 2026</p>
    </footer>

</body>
</html>
